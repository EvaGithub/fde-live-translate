# fly.toml app configuration file generated for fde-live-translate-gateway on 2026-07-12T15:17:25+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fde-live-translate-gateway'
primary_region = 'ord'

[build]
[env]
  PORT = '8787'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
