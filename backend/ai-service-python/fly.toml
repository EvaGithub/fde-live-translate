# fly.toml app configuration file generated for fde-live-translate-ai on 2026-07-12T15:06:45+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fde-live-translate-ai'
primary_region = 'ord'

[build]
[env]
  PORT = '8000'

# PRIVATE service behind Fly's proxy. The app has NO public IP (only a private
# flycast IPv6), so the browser can never reach it — only the gateway can, at
# http://fde-live-translate-ai.flycast. force_https=false = plain http on the
# private network. min_machines_running=1 keeps it always warm (fixes the "6PN
# can't auto-wake a stopped machine" problem); auto_start wakes it if it ever stops.
[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

# Persistent disk for the SQLite cache. Without this the cache lives inside the
# container and is wiped on every redeploy; mounted at /data it survives.
[mounts]
  source = 'translate_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
