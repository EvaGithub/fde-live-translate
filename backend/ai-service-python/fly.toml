# fly.toml app configuration file generated for fde-live-translate-ai on 2026-07-12T15:06:45+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fde-live-translate-ai'
primary_region = 'ord'

[build]
[env]
  PORT = '8000'

# PRIVATE service: no [http_service], so no public IP. Reachable only by the
# gateway over Fly's 6PN network at fde-live-translate-ai.internal:8000 (the app
# binds :: / IPv6 for this). The browser can never reach it directly.

# Persistent disk for the SQLite cache. Without this the cache lives inside the
# container and is wiped on every redeploy; mounted at /data it survives.
[mounts]
  source = 'translate_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
