# fly.toml app configuration file generated for fde-live-translate-ai on 2026-07-12T15:06:45+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fde-live-translate-ai'
primary_region = 'ord'

[build]
[env]
  PORT = '8000'

# No [http_service] on purpose: this is a PRIVATE service. It has no public IP
# and is reachable only by the gateway over Fly's 6PN network at
# fde-live-translate-ai.internal:8000. The browser can never reach it directly.

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
